name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Ia codul aplicației
      - name: Checkout App Repo
        uses: actions/checkout@v3

      # 2️⃣ Creează tag unic din SHA
      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 3️⃣ Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Build imagine
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/habit-tracker:${{ env.IMAGE_TAG }} .

      # 5️⃣ Push imagine
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/habit-tracker:${{ env.IMAGE_TAG }}

      # 6️⃣ Checkout repo infrastructură 2
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          repository: Leush91/habit-tracker-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      # 7️⃣ Instalează yq (editor YAML)
      - name: Install yq
        run: sudo snap install yq

      # 8️⃣ Modifică tag-ul în values.yaml
      - name: Update values.yaml
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          yq -i '.image.tag = strenv(IMAGE_TAG)' infra/charts/habit-tracker/values.yaml

      # 9️⃣ Commit și Push în repo infra
      - name: Commit and Push Changes
        run: |
          cd infra
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tag to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push
