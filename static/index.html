<!DOCTYPE html>
<html>
<head>
  <title>Habit Tracker</title>
  <script src="http://auth.local/js/keycloak.js"></script>
</head>
<body>
  <h1>Habit Tracker</h1>

  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="userInfo">Not logged in</p>

  <input id="habitInput" placeholder="New habit" />
  <button onclick="addHabit()">Add</button>

  <h2>Habits:</h2>
  <ul id="habitList"></ul>

  <script>
    let keycloak = new Keycloak({
      url: "http://auth.local",
      realm: "devops-lvlup",
      clientId: "habit-tracker"
    });

    async function initAuth() {
      const authenticated = await keycloak.init({
        onLoad: "check-sso",
        pkceMethod: "S256"
      });

      if (authenticated) {
        document.getElementById("userInfo").textContent =
          "Logged in as: " + keycloak.tokenParsed.preferred_username;
      } else {
        document.getElementById("userInfo").textContent = "Not logged in";
      }
    }

    function login() {
      keycloak.login();
    }

    function logout() {
      keycloak.logout({
        redirectUri: "https://habit.local"
      });
    }

    async function loadHabits() {
      if (!keycloak.authenticated) {
        return;
      }

      const res = await fetch("/habits", {
        headers: {
          "Authorization": "Bearer " + keycloak.token
        }
      });

      const data = await res.json();

      const list = document.getElementById("habitList");
      list.innerHTML = "";

      data.forEach(habit => {
        const li = document.createElement("li");
        li.textContent = habit.name;
        list.appendChild(li);
      });
    }

    async function addHabit() {
      if (!keycloak.authenticated) {
        alert("Please login first");
        return;
      }

      const name = document.getElementById("habitInput").value;

      const res = await fetch(`/habits?name=${encodeURIComponent(name)}`, {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + keycloak.token
        }
      });

      if (res.status === 403) {
        alert("You do not have permission to add habits");
        return;
      }

      document.getElementById("habitInput").value = "";
      loadHabits();
    }

    initAuth().then(loadHabits);
  </script>
</body>
</html>
