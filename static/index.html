<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <script src="/static/keycloak.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .status {
      padding: 8px 12px;
      background: #f3f3f3;
      border-radius: 6px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
    }

    .message {
      margin: 12px 0;
      font-weight: bold;
    }

    .error {
      color: #b00020;
    }

    .success {
      color: #0a7a2f;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>Habit Tracker</h1>

  <div class="topbar">
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <div id="userInfo" class="status">Initializing...</div>
  </div>

  <div class="form-row">
    <input id="habitInput" placeholder="New habit" />
    <button onclick="addHabit()">Add</button>
  </div>

  <div id="message" class="message"></div>

  <h2>Habits</h2>
  <ul id="habitList"></ul>

  <script>
    let keycloak = null;

    function setMessage(text, type = "") {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = "message " + type;
    }

    function clearMessage() {
      setMessage("", "");
    }

    function updateUserInfo() {
      const userInfo = document.getElementById("userInfo");

      if (!keycloak || !keycloak.authenticated) {
        userInfo.textContent = "Not logged in";
        return;
      }

      const username = keycloak.tokenParsed?.preferred_username || "unknown";
      const roles = keycloak.tokenParsed?.realm_access?.roles || [];
      userInfo.textContent = `Logged in as: ${username} | Roles: ${roles.join(", ")}`;
    }

    async function initAuth() {
      try {
        if (typeof Keycloak === "undefined") {
          setMessage("Keycloak script did not load.", "error");
          console.error("Keycloak is undefined");
          return;
        }

        keycloak = new Keycloak({
          url: "https://auth.local",
          realm: "devops-lvlup",
          clientId: "habit-tracker"
        });

        const authenticated = await keycloak.init({
          onLoad: "check-sso",
          pkceMethod: "S256",
          checkLoginIframe: false
        });

        updateUserInfo();

        if (authenticated) {
          setMessage("Login successful.", "success");
          await loadHabits();
        } else {
          setMessage("Please login to view habits.", "");
        }
      } catch (err) {
        console.error("Keycloak init failed:", err);
        setMessage("Authentication initialization failed. Check browser console.", "error");
      }
    }

    function login() {
      if (!keycloak) {
        setMessage("Keycloak is not initialized yet.", "error");
        return;
      }

      keycloak.login({
        redirectUri: "https://habit.local"
      });
    }

    function logout() {
      if (!keycloak) {
        return;
      }

      keycloak.logout({
        redirectUri: "https://habit.local"
      });
    }

    async function ensureFreshToken() {
      if (!keycloak || !keycloak.authenticated) {
        return false;
      }

      try {
        await keycloak.updateToken(30);
        return true;
      } catch (err) {
        console.error("Token refresh failed:", err);
        setMessage("Session expired. Please login again.", "error");
        return false;
      }
    }

    async function loadHabits() {
      clearMessage();

      if (!keycloak || !keycloak.authenticated) {
        updateUserInfo();
        return;
      }

      const tokenOk = await ensureFreshToken();
      if (!tokenOk) {
        return;
      }

      try {
        const res = await fetch("/habits", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + keycloak.token
          }
        });

        if (res.status === 401) {
          setMessage("Unauthorized. Please login again.", "error");
          return;
        }

        if (res.status === 403) {
          setMessage("You do not have permission to view habits.", "error");
          return;
        }

        if (!res.ok) {
          setMessage("Failed to load habits. Status: " + res.status, "error");
          return;
        }

        const data = await res.json();
        const list = document.getElementById("habitList");
        list.innerHTML = "";

        data.forEach(habit => {
          const li = document.createElement("li");
          li.textContent = `${habit.name} (${habit.created_at})`;
          list.appendChild(li);
        });

        if (data.length === 0) {
          const li = document.createElement("li");
          li.textContent = "No habits yet.";
          list.appendChild(li);
        }
      } catch (err) {
        console.error("loadHabits failed:", err);
        setMessage("Error while loading habits.", "error");
      }
    }

    async function addHabit() {
      clearMessage();

      if (!keycloak || !keycloak.authenticated) {
        setMessage("Please login first.", "error");
        return;
      }

      const tokenOk = await ensureFreshToken();
      if (!tokenOk) {
        return;
      }

      const input = document.getElementById("habitInput");
      const name = input.value.trim();

      if (!name) {
        setMessage("Please enter a habit name.", "error");
        return;
      }

      try {
        const res = await fetch(`/habits?name=${encodeURIComponent(name)}`, {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + keycloak.token
          }
        });

        if (res.status === 401) {
          setMessage("Unauthorized. Please login again.", "error");
          return;
        }

        if (res.status === 403) {
          setMessage("You do not have permission to add habits.", "error");
          return;
        }

        if (!res.ok) {
          setMessage("Failed to add habit. Status: " + res.status, "error");
          return;
        }

        input.value = "";
        setMessage("Habit added successfully.", "success");
        await loadHabits();
      } catch (err) {
        console.error("addHabit failed:", err);
        setMessage("Error while adding habit.", "error");
      }
    }

    window.addEventListener("load", initAuth);
  </script>
</body>
</html>
